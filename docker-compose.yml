services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/pocket_battles
      - PORT=3001
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # Las variables VITE_ deben pasar como build args porque Vite las bakea
      # en el bundle estático durante el build (no son accesibles en runtime).
      # Pon estas variables en el .env de la raíz del repo antes de docker compose up.
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  mongo-data:
